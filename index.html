<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Insurance CRM | Notion Style</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <i data-lucide="shield-check"></i>
                    <span>InsurePro</span>
                </div>
            </div>
            
            <nav class="sidebar-nav">
                <div class="nav-section">
                    <label>Main</label>
                    <a href="#" class="nav-item active" data-view="dashboard">
                        <i data-lucide="layout-dashboard"></i> Dashboard
                    </a>
                </div>
                
                <div class="nav-section">
                    <label>Databases</label>
                    <a href="#" class="nav-item" data-view="clients">
                        <i data-lucide="users"></i> Clients
                    </a>
                    <a href="#" class="nav-item" data-view="claims">
                        <i data-lucide="folder-kanban"></i> Claim Folder
                    </a>
                    <a href="#" class="nav-item" data-view="schedule">
                        <i data-lucide="calendar"></i> Schedule
                    </a>
                    <a href="#" class="nav-item" data-view="follow-up">
                        <i data-lucide="history"></i> Follow up
                    </a>
                    <a href="#" class="nav-item" data-view="goals">
                        <i data-lucide="target"></i> Goals
                    </a>

                </div>
            </nav>
            
            <div class="sidebar-footer">
                <div class="user-profile">
                    <div class="avatar">JD</div>
                    <div class="user-info">
                        <span class="name">John Doe</span>
                        <span class="role">Insurance Specialist</span>
                    </div>
                </div>
            </div>
        </aside>

        <!-- Sidebar Overlay (mobile tap-to-close) -->
        <div class="sidebar-overlay" id="sidebar-overlay"></div>

        <!-- Main Content -->
        <main class="main-wrapper">
            <header class="top-header">
                <div style="display:flex; align-items:center; gap:4px;">
                    <button class="menu-toggle" id="menu-toggle" aria-label="Open menu">
                        <i data-lucide="menu"></i>
                    </button>
                    <div class="breadcrumb">
                        <span id="breadcrumb-parent">Main</span>
                        <span class="separator">/</span>
                        <span id="breadcrumb-current">Dashboard</span>
                    </div>
                </div>
                <div class="header-actions">
                    <div class="search-bar">
                        <i data-lucide="search"></i>
                        <input type="text" placeholder="Search everything...">
                    </div>
                    <button class="btn btn-primary" id="btn-add-global">
                        <i data-lucide="plus"></i> <span>New</span>
                    </button>
                </div>
            </header>

            <section id="view-content" class="content-area">
                <!-- Rendered dynamically by app.js -->
            </section>
        </main>
    </div>

    <!-- Modals -->
    <div id="modal-container" class="modal-overlay hidden">
        <div class="modal">
            <div class="modal-header">
                <h3 id="modal-title">New Entry</h3>
                <button class="btn-close" id="btn-close-modal">
                    <i data-lucide="x"></i>
                </button>
            </div>
            <div class="modal-body" id="modal-content">
                <!-- Form fields injected here -->
            </div>
            <div class="modal-footer">
                <button class="btn btn-ghost" id="btn-cancel">Cancel</button>
                <button class="btn btn-primary" id="btn-save">Save Change</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
    <script>
      // Initialize Lucide icons
      lucide.createIcons();
    </script>
</body>
</html>
